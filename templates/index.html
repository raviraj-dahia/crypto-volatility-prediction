<!DOCTYPE html>
<html>
<head>
    <title>Volatility Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        h2 {
            margin-bottom: 20px;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Volatility Predictor</h2>

    <!-- Correct Inputs -->
    <input type="number" id="open" placeholder="Open Price" required>
    <input type="number" id="high" placeholder="High Price" required>
    <input type="number" id="low" placeholder="Low Price" required>
    <input type="number" id="close" placeholder="Close Price" required>
    <input type="number" id="volume" placeholder="Volume" required>
    <input type="number" id="marketCap" placeholder="Market Cap" required>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {

    const open = document.getElementById("open").value;
    const high = document.getElementById("high").value;
    const low = document.getElementById("low").value;
    const close = document.getElementById("close").value;
    const volume = document.getElementById("volume").value;
    const marketCap = document.getElementById("marketCap").value;

    // VALIDATION
    if (!open || !high || !low || !close || !volume || !marketCap) {
        alert("Please fill all fields!");
        return;
    }

    const data = {
        open: parseFloat(open),
        high: parseFloat(high),
        low: parseFloat(low),
        close: parseFloat(close),
        volume: parseFloat(volume),
        marketCap: parseFloat(marketCap)
    };

    console.log("Sending data:", data);

    try {
        const response = await fetch("https://crypto-volatility-api.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        console.log("API Response:", result);

        if (result.error) {
            document.getElementById("result").innerText = "Error: " + result.error;
            return;
        }
        // volatility % + risk level

        const value = result.predicted_volatility;
        const percent = (value * 100).toFixed(2);

        let level = "";
        let color = "";

        if (value < 0.02){
            level = "Low Risk";
            color = "green";
        }else if (value < 0.05){
            level = "High Risk";
            color = "orange"
        }else{
            level = "High Risk";
            color = "red";
        }

        const resultDiv= document.getElementById("result");
        resultDiv.style.color = color;
        resultDiv.innerText = `Volatility: ${percent}% (${level})`;   

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error connecting to server";
    }
}
</script>

</body>
</html>
